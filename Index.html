<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitation de Mariage</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle, #ffffff 0%, #e2e8f0 100%);
      margin: 0;
      overflow: hidden;
    }
    
    .envelope-wrapper {
      position: relative;
      cursor: pointer;
      perspective: 2000px;
      margin-top: 200px; 
    }

    .envelope {
      position: relative;
      width: 350px;
      height: 350px;
      background-color: #f1eee4;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
      overflow: hidden; 
    }
    
    .envelope.reveal-card {
      overflow: visible !important;
    }
    
    .envelope-wrapper:hover .envelope {
      transform: translateY(-5px) rotateX(5deg);
    }
    
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 175px solid transparent;
      border-right: 175px solid transparent;
      border-top: 175px solid #e3decb;
      transform-origin: top center;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
    }
    
    .front-face {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #faf9f6;
      z-index: 3;
    }
    
    .recipient-box {
      position: absolute;
      bottom: 118px; 
      left: 50%;
      width: 80%;
      transform: translateX(-50%) !important;
      font-family: "Aref Ruqaa", "Microsoft Yi Baiti", "Urdu Typesetting", serif !important;
      font-weight: 400 !important;
      font-style: normal !important;
      font-size: 26px !important;
      color: #2c2c2c;
      direction: rtl;
      text-align: center;
      white-space: nowrap;
      border-bottom: 1px dotted #c9ad6a;
      padding-bottom: 8px;
      display: block !important;
    }
    
    .card {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 350px;
      height: 350px;
      background: white;
      z-index: 1; 
      opacity: 0;
      visibility: hidden; 
      box-shadow: 0 0 0 rgba(0, 0, 0, 0); 
      display: flex;
      flex-direction: column;
      will-change: transform, opacity; 
      transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s linear 0.8s, visibility 0s linear 1.2s, z-index 0s linear 1.2s;
    }
    
    .card-image-part {
      width: 100%;
      height: 310px;
      background-color: #ffffff;
    }
    
    .card-image-part img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .maps-link {
      width: 100%;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      font-size: 13px;
      color: #c9ad6a;
      font-weight: bold;
      background-color: #ffffff;
      text-decoration: none;
      z-index: 5; 
      cursor: pointer;
    }
    
    .maps-link:hover {
      color: #9a7d3b;
      text-decoration: underline;
    }
    
    .envelope-wrapper.open .flap {
      transform: rotateX(180deg);
    }
    
    .envelope-wrapper.open .card {
      opacity: 1 !important;
      visibility: visible !important;
      transform: translateY(-350px); 
      z-index: 1; 
      transition: transform 1.6s cubic-bezier(0.25, 1, 0.5, 1) 0.5s, opacity 0.1s linear 0.5s, visibility 0s linear 0.5s;
    }
    
    .envelope-wrapper.open .card.settle {
      z-index: 4 !important; 
      transform: translateY(-175px); 
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.12), 0 4px 10px rgba(0, 0, 0, 0.05);
      transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.5s ease;
    }
  </style>
</head>
<body>

  <div class="envelope-wrapper" id="envelopeContainer">
    <div class="envelope" id="envelopeBody">
      <div class="flap"></div>
      
      <div class="card">
        <div class="card-image-part">
          <!-- REMPLACEZ CE LIEN PAR VOTRE LIEN IMGBB DIRECT -->
          <img src="https://i.ibb.co/mC3TqgjJ/invitation.png" alt="Invitation Mariage">
        </div>
        
        <a href="google.com" target="_blank" class="maps-link">
          📍 Avenue de la Promenade, La Marsa, Gammarth
        </a>
      </div>
      
      <div class="front-face">
        <div class="recipient-box">إلى عائلة بن علي المحترمين</div>
      </div>
    </div>
  </div>

  <script>
    const wrapper = document.getElementById('envelopeContainer');
    const envelopeBody = document.getElementById('envelopeBody');
    const card = document.querySelector('.card');

    wrapper.addEventListener('click', (event) => {
      if (event.target.classList.contains('maps-link')) return;

      if (!wrapper.classList.contains('open')) {
        wrapper.classList.add('open');
        setTimeout(() => {
          envelopeBody.classList.add('reveal-card');
        }, 400); 
        setTimeout(() => {
          card.classList.add('settle');
        }, 2100); 
      } else {
        card.classList.remove('settle');
        setTimeout(() => {
          wrapper.classList.remove('open');
          envelopeBody.classList.remove('reveal-card');
        }, 200);
      }
    });
  </script>
</body>
</html>
